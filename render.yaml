# Render blueprint for Website Tracker (single web service serving API + built SPA).
# The web app is built and served by the Express server on the same origin, so
# the session cookie works without cross-site config.
#
# Before first deploy: create a Neon Postgres database and set DATABASE_URL below
# (Render dashboard → Environment). JWT_SECRET is generated automatically.
services:
  - type: web
    name: website-tracker
    runtime: node
    region: ohio # matches the Neon DB region (us-east) so queries stay fast
    plan: starter
    # NOTE: the live service is deployed from the Dockerfile, which is the
    # authority. Keep this in step with it — the public marketing site is served
    # at / and must be built too, or the site ships with only the admin app.
    buildCommand: >-
      cd web && npm install && npm run build &&
      cd ../public && npm install && npm run build &&
      cd ../server && npm install && npm run build
    startCommand: >-
      cd server && npx prisma migrate deploy &&
      { PRICING_SEED_IF_EMPTY=true npm run db:seed:pricing || echo '[start] pricing seed failed - continuing'; } &&
      node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Neon POOLED url (…-pooler…?sslmode=require&pgbouncer=true)
      - key: DIRECT_URL
        sync: false # Neon DIRECT url (no -pooler, ?sslmode=require) — for migrations
      - key: JWT_SECRET
        generateValue: true
      # Admin user is pre-seeded on the Neon DB, so ADMIN_* are not needed here.
